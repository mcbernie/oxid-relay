# OxidRelay example configuration.
# Copy to config.toml (or config.local.toml) and adjust.
# The relay is LAN-only; never expose it to the public internet.

[mail.smtp]
host = "smtp.office365.com"
port = 587
username = "relay@example.com"
# Password is read from this environment variable, never stored here.
password_env = "MAIL_PASSWORD"

[queue]
database = "queue.db"

# Dispatcher tuning. All values shown are the defaults; omit the section to use
# them. Times are in seconds.
[dispatcher]
batch_size = 64          # mails fetched per poll
concurrency = 8          # parallel deliveries
poll_interval_secs = 5   # delay between polls
sending_lease_secs = 120 # in-flight mail older than this is retried (self-heal)
max_attempts = 5         # attempts before a mail is buried as dead
retry_base_secs = 30     # first retry delay (exponential backoff)
retry_max_secs = 3600    # backoff cap

# SMTP ingress: the relay accepts mail on the LAN. Presence of this section
# enables it. v1 accepts anonymous submission (mode A); enable [auth.anonymous]
# below. AUTH LOGIN/PLAIN requires STARTTLS and arrives in a later step.
[ingress.smtp]
bind = "127.0.0.1:2525"
hostname = "oxid-relay"

[logging]
# One of: trace, debug, info, warn, error
level = "info"

[subject]
# Placeholders: %name% (sender identity), %original% (incoming subject).
# Must contain %original%.
format = "[Abs: %name%] %original%"

# Optional per-sender override.
[subject.senders."Server01.company.local"]
format = "[%name%] %original%"

[security]
# Mandatory in every mode. Empty means nothing is allowed.
ip_whitelist = ["10.0.0.0/8", "192.168.0.0/16"]

# Mode A: anonymous, identify sender from the subject.
[auth.anonymous]
enabled = true
subject_match = "^(?P<name>Server ?\\d+):"

# Mode B1: fixed credentials per service.
[auth.services."backup-host"]
username = "backup"
password_env = "BACKUP_PASSWORD"

# Mode B2: self-registration from supplied credentials.
[auth.self_register]
enabled = false

# Routing: pick the channel (transport) and optionally override recipients,
# based on the envelope sender. Only active if at least one rule or a default
# is set. A rule with transport = "reject" (or an unmatched sender without a
# default) refuses the mail at submission time.
#
# Sender keys and recipient addresses must be valid e-mail addresses with a
# domain part, e.g. "alerts@teams.local" (not just "alerts@teams"). The sending
# service must use the same address in its SMTP MAIL FROM for the rule to match.
[routing]
# Default for senders without a specific rule. Omit to reject unknown senders.
[routing.default]
transport = "graph"

# Example: mail from this sender goes to Teams, to a fixed channel recipient.
[routing.senders."alerts@teams.local"]
transport = "teams"
recipients = ["ops-channel@teams.local"]

# Example: refuse a specific sender.
[routing.senders."noreply@blocked.local"]
transport = "reject"

# Example: fan out one sender to several channels. Each target becomes its own
# queue entry, delivered and retried independently. A target may override the
# recipients; a "reject" target is skipped.
[routing.senders."alarm@monitoring.local"]
targets = [
    { transport = "teams", recipients = ["ops-channel@teams.local"] },
    { transport = "ntfy" },
    { transport = "graph", recipients = ["oncall@example.com"] },
]

# Per-plugin settings, keyed by plugin name. Passed to the plugin script as its
# `config` map. Keys ending in _env are resolved from the named environment
# variable and exposed under the key without the suffix (e.g. client_secret_env
# becomes client_secret). Secrets must use the _env form, never plain text.
[plugins.graph]
tenant_id = "00000000-0000-0000-0000-000000000000"
client_id = "11111111-1111-1111-1111-111111111111"
client_secret_env = "GRAPH_CLIENT_SECRET"
sender = "relay@example.com"

# Microsoft Teams via incoming webhook. The webhook URL contains a secret, so
# store it through an environment variable.
[plugins.teams]
webhook_url_env = "TEAMS_WEBHOOK_URL"

# ntfy push notifications. "server" defaults to https://ntfy.sh; "token" is only
# needed for protected topics.
[plugins.ntfy]
topic = "oxidrelay-alerts"
server = "https://ntfy.sh"
# token_env = "NTFY_TOKEN"
